<!DOCTYPE html>
<html>
<head>
    <title>MongoDB Atlas Search Service</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <script src="https://unpkg.com/react@17/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@material-ui/core@latest/umd/material-ui.development.js" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5efe6;
            --bg-accent: #efe2d0;
            --panel: rgba(255, 250, 244, 0.90);
            --panel-strong: rgba(255, 255, 255, 0.96);
            --stroke: rgba(92, 69, 43, 0.16);
            --text: #23180f;
            --muted: #726454;
            --accent: #b4531d;
            --accent-deep: #8f3e14;
            --accent-soft: rgba(180, 83, 29, 0.14);
            --shadow: 0 20px 50px rgba(69, 45, 20, 0.12);
            --toolbar-height: 92px;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            color: var(--text);
            background:
                    radial-gradient(circle at top left, rgba(180, 83, 29, 0.17), transparent 28%),
                    radial-gradient(circle at top right, rgba(27, 88, 94, 0.10), transparent 26%),
                    linear-gradient(180deg, #fbf7f1 0%, var(--bg) 100%);
            font-family: "Manrope", sans-serif;
        }

        #root {
            height: 100%;
        }

        .app-shell {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 24px;
            min-height: var(--toolbar-height);
            padding: 20px 28px;
            border-bottom: 1px solid var(--stroke);
            background: rgba(255, 250, 244, 0.68);
            backdrop-filter: blur(22px);
        }

        .brand-lockup {
            min-width: 290px;
        }

        .brand-title {
            margin: 0;
            font-family: "Fraunces", serif;
            font-size: 1.95rem;
            line-height: 1;
            letter-spacing: -0.03em;
        }

        .brand-subtitle {
            margin-top: 6px;
            color: var(--muted);
            font-size: 0.92rem;
        }

        .toolbar-search {
            flex: 1;
        }

        .workspace {
            display: grid;
            grid-template-columns: 320px minmax(0, 1fr);
            gap: 18px;
            height: calc(100% - var(--toolbar-height));
            padding: 18px;
            min-height: 0;
        }

        .sidebar,
        .content-panel {
            min-height: 0;
            border: 1px solid var(--stroke);
            border-radius: 26px;
            background: var(--panel);
            box-shadow: var(--shadow);
        }

        .sidebar {
            overflow: auto;
            padding: 20px 18px 22px;
        }

        .content-panel {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background:
                    linear-gradient(180deg, rgba(255, 252, 247, 0.98) 0%, rgba(252, 247, 239, 0.94) 100%);
        }

        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            padding: 18px 22px;
            border-bottom: 1px solid var(--stroke);
            background: rgba(255, 255, 255, 0.52);
        }

        .results-body {
            flex: 1;
            min-height: 0;
            overflow: auto;
            padding: 18px 22px 24px;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
        }

        .result-card {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 12px;
            border: 1px solid rgba(92, 69, 43, 0.12);
            border-radius: 22px;
            background: var(--panel-strong);
            box-shadow: 0 12px 28px rgba(69, 45, 20, 0.08);
            cursor: pointer;
            transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
        }

        .result-card:hover {
            transform: translateY(-4px);
            border-color: rgba(180, 83, 29, 0.34);
            box-shadow: 0 18px 34px rgba(69, 45, 20, 0.12);
        }

        .delete-image-button {
            color: #9f1239 !important;
            border-color: rgba(159, 18, 57, 0.32) !important;
        }

        .delete-image-button:hover {
            border-color: rgba(159, 18, 57, 0.56) !important;
            background: rgba(159, 18, 57, 0.06) !important;
        }

        .result-thumb {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 16px;
            background: #f2ebdf;
        }

        .result-caption {
            font-size: 0.95rem;
            font-weight: 700;
            line-height: 1.4;
        }

        .card-meta {
            color: var(--muted);
            font-size: 0.83rem;
        }

        .full-screen-view {
            display: grid;
            grid-template-columns: minmax(0, 1.2fr) minmax(320px, 0.8fr);
            gap: 22px;
            height: 100%;
            align-items: stretch;
        }

        .full-screen-stage {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 0;
            padding: 18px;
            border-radius: 24px;
            background:
                    linear-gradient(180deg, rgba(243, 235, 223, 0.8) 0%, rgba(255, 249, 241, 0.96) 100%);
        }

        .full-screen-image {
            display: block;
            max-width: 100%;
            max-height: 62vh;
            width: auto;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 24px 42px rgba(0, 0, 0, 0.14);
            background: #f2ebdf;
        }

        .full-screen-sidebar {
            display: flex;
            flex-direction: column;
            gap: 18px;
            min-height: 0;
            padding: 18px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.78);
            border: 1px solid rgba(92, 69, 43, 0.10);
        }

        .full-screen-delete-row {
            display: flex;
            justify-content: flex-end;
            margin-top: auto;
        }

        .full-screen-caption {
            font-family: "Fraunces", serif;
            font-size: 1.5rem;
            line-height: 1.25;
            margin: 0;
        }

        .full-screen-meta {
            color: var(--muted);
            font-size: 0.94rem;
            line-height: 1.7;
        }

        .nav-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .section-label {
            margin-bottom: 10px;
            color: var(--muted);
            font-size: 0.82rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .filter-group {
            margin-bottom: 20px;
            padding-bottom: 18px;
            border-bottom: 1px solid rgba(92, 69, 43, 0.08);
        }

        .chip-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .sidebar-add-image {
            padding-bottom: 30px;
        }

        .add-image-button {
            width: 100%;
            background: #2563eb !important;
            color: #ffffff !important;
            border-radius: 14px !important;
            box-shadow: 0 10px 22px rgba(37, 99, 235, 0.24) !important;
        }

        .add-image-button:hover {
            background: #1d4ed8 !important;
        }

        .back-button {
            width: 100%;
            border-radius: 14px !important;
        }

        .plus-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            margin-right: 8px;
            font-size: 1.25rem;
            font-weight: 800;
            line-height: 1;
        }

        .upload-screen {
            display: grid;
            grid-template-columns: minmax(280px, 380px) minmax(0, 1fr);
            gap: 22px;
            height: 100%;
        }

        .upload-form,
        .upload-result {
            min-height: 0;
            padding: 18px;
            border: 1px solid rgba(92, 69, 43, 0.10);
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.78);
        }

        .upload-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .upload-preview {
            width: 100%;
            max-height: 42vh;
            object-fit: contain;
            border-radius: 18px;
            background: #f2ebdf;
        }

        .paste-target {
            padding: 14px;
            border: 1px dashed rgba(92, 69, 43, 0.24);
            border-radius: 16px;
            background: rgba(255, 250, 244, 0.72);
            color: var(--muted);
            font-size: 0.9rem;
            line-height: 1.5;
            outline: none;
        }

        .paste-target:focus {
            border-color: rgba(180, 83, 29, 0.56);
            box-shadow: 0 0 0 3px rgba(180, 83, 29, 0.12);
        }

        .upload-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .webcam-video {
            width: 100%;
            max-height: 42vh;
            object-fit: contain;
            border-radius: 18px;
            background: #23180f;
        }

        .embedding-preview {
            max-height: 180px;
            overflow: auto;
            padding: 12px;
            border-radius: 12px;
            background: rgba(35, 24, 15, 0.06);
            color: var(--muted);
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-size: 0.78rem;
            line-height: 1.5;
        }

        @media (max-width: 1100px) {
            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }

            .brand-lockup {
                min-width: 0;
            }

            .workspace {
                grid-template-columns: 1fr;
                height: auto;
                overflow: auto;
            }

            .sidebar {
                max-height: none;
            }

            .content-panel {
                min-height: 60vh;
            }

            .full-screen-view {
                grid-template-columns: 1fr;
            }

            .upload-screen {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 720px) {
            html, body {
                overflow: auto;
            }

            .app-shell {
                height: auto;
                min-height: 100%;
            }

            .toolbar {
                padding: 18px 16px;
            }

            .workspace {
                padding: 14px;
                gap: 14px;
            }

            .content-header,
            .results-body {
                padding-left: 16px;
                padding-right: 16px;
            }

            .results-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;
    const {
        Typography,
        Checkbox,
        Radio,
        RadioGroup,
        FormControlLabel,
        FormControl,
        TextField,
        Box,
        Button,
        Chip,
        CircularProgress,
    } = MaterialUI;

    const FILTER_KEYS = [
        'animal',
        'appliance',
        'electronic',
        'food',
        'furniture',
        'indoor',
        'kitchen',
        'outdoor',
        'sports',
        'vehicle'
    ];
    const PAGE_SIZE = 10;
    const SEARCH_TYPE_STORAGE_KEY = 'atlasCoco.searchTypeSelection';

    function toTitleCase(value) {
        return value.charAt(0).toUpperCase() + value.slice(1);
    }

    function createEmptyFilterState() {
        return FILTER_KEYS.reduce((acc, key) => {
            acc[key] = [];
            return acc;
        }, {});
    }

    function buildSearchParams({ query, page, searchType, hasPerson, filters }) {
        const params = new URLSearchParams();
        const trimmedQuery = query.trim();
        if (trimmedQuery) {
            params.set('text', trimmedQuery);
        }
        params.set('page', String(page));
        params.set('searchType', searchType);

        if (hasPerson === 'true' || hasPerson === 'false') {
            params.set('hasPerson', hasPerson);
        }

        FILTER_KEYS.forEach(key => {
            if (filters[key].length > 0) {
                params.set(key, filters[key].join(','));
            }
        });

        return params;
    }

    function getRequestedSearchType(searchTypeSelection, vectorSearchEnabled) {
        if (!vectorSearchEnabled) {
            return 'Text';
        }
        return searchTypeSelection;
    }

    function getSearchPlaceholder(searchTypeSelection, vectorSearchEnabled) {
        if (!vectorSearchEnabled || searchTypeSelection === 'Text') {
            return 'Search image captions with keyword text';
        }
        if (searchTypeSelection === 'Vector') {
            return 'Search by semantic meaning with vector similarity';
        }
        return 'Search with combined text and vector ranking';
    }

    function readStoredSearchType() {
        const storedValue = window.localStorage.getItem(SEARCH_TYPE_STORAGE_KEY);
        if (storedValue === 'Both') {
            return 'Combined';
        }
        return ['Text', 'Vector', 'Combined'].includes(storedValue) ? storedValue : 'Text';
    }

    function App() {
        const [query, setQuery] = useState('');
        const [page, setPage] = useState(0);
        const [pageDocs, setPageDocs] = useState({});
        const [pageHasMore, setPageHasMore] = useState({});
        const [facet, setFacet] = useState(null);
        const [filters, setFilters] = useState(createEmptyFilterState());
        const [optionsByFilter, setOptionsByFilter] = useState(createEmptyFilterState());
        const [hasPerson, setHasPerson] = useState('any');
        const [searchTypeSelection, setSearchTypeSelection] = useState(readStoredSearchType);
        const [vectorSearchEnabled, setVectorSearchEnabled] = useState(false);
        const [searchError, setSearchError] = useState('');
        const [loadingPage, setLoadingPage] = useState(false);
        const [activeScreen, setActiveScreen] = useState('Search');
        const [viewMode, setViewMode] = useState('Grid');
        const [viewer, setViewer] = useState(null);
        const [loadingViewerPage, setLoadingViewerPage] = useState(false);
        const [deletingImageId, setDeletingImageId] = useState(null);
        const [lmStudioCaptioningEnabled, setLmStudioCaptioningEnabled] = useState(false);
        const [captionImageUrl, setCaptionImageUrl] = useState('');
        const [captionImageBase64, setCaptionImageBase64] = useState('');
        const [captionImageMimeType, setCaptionImageMimeType] = useState('');
        const [captionPreviewUrl, setCaptionPreviewUrl] = useState('');
        const [captionResult, setCaptionResult] = useState(null);
        const [captionLoading, setCaptionLoading] = useState(false);
        const [captionAddLoading, setCaptionAddLoading] = useState(false);
        const [captionSavedImage, setCaptionSavedImage] = useState(null);
        const [captionError, setCaptionError] = useState('');
        const [webcamStream, setWebcamStream] = useState(null);
        const [webcamError, setWebcamError] = useState('');
        const requestKeyRef = useRef('');
        const previousScreenRef = useRef('Search');
        const captionPreviewRef = useRef(null);
        const webcamVideoRef = useRef(null);
        const webcamCanvasRef = useRef(null);

        const domain = document.location.host.includes('localhost') ? 'http://localhost:8222' : '';
        const currentPageDocs = pageDocs[page] || [];
        const currentPageHasMore = !!pageHasMore[page];
        const requestedSearchType = useMemo(
            () => getRequestedSearchType(searchTypeSelection, vectorSearchEnabled),
            [searchTypeSelection, vectorSearchEnabled]
        );
        const effectiveSearchLabel = query.trim() ? requestedSearchType : 'Browse';
        const showFacetCounts = requestedSearchType === 'Text' || !query.trim();
        const searchPlaceholder = getSearchPlaceholder(searchTypeSelection, vectorSearchEnabled);

        useEffect(() => {
            fetch(`${domain}/capabilities`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Failed to load search capabilities');
                    }
                    return response.json();
                })
                .then(data => {
                    setVectorSearchEnabled(!!data.vectorSearchEnabled);
                    setLmStudioCaptioningEnabled(!!data.lmStudioCaptioningEnabled);
                })
                .catch(error => {
                    setSearchError(error.message || 'Failed to load search capabilities');
                });
        }, []);

        useEffect(() => {
            fetch(`${domain}/categories`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Failed to load categories');
                    }
                    return response.json();
                })
                .then(data => {
                    const grouped = createEmptyFilterState();
                    data.forEach(category => {
                        const key = category.superCategory;
                        if (FILTER_KEYS.includes(key)) {
                            grouped[key].push(category.name);
                        }
                    });
                    FILTER_KEYS.forEach(key => {
                        grouped[key] = Array.from(new Set(grouped[key])).sort();
                    });
                    setOptionsByFilter(grouped);
                })
                .catch(error => {
                    setSearchError(error.message || 'Failed to load categories');
                });
        }, []);

        useEffect(() => {
            if (!vectorSearchEnabled && searchTypeSelection !== 'Text') {
                setSearchTypeSelection('Text');
            }
        }, [vectorSearchEnabled, searchTypeSelection]);

        useEffect(() => {
            window.localStorage.setItem(SEARCH_TYPE_STORAGE_KEY, searchTypeSelection);
        }, [searchTypeSelection]);

        useEffect(() => {
            if (webcamVideoRef.current && webcamStream) {
                webcamVideoRef.current.srcObject = webcamStream;
            }
        }, [webcamStream]);

        useEffect(() => {
            if (activeScreen !== 'Caption Image') {
                return;
            }

            document.addEventListener('paste', handleCaptionPaste, true);
            document.addEventListener('keydown', handleCaptionPasteShortcut, true);
            return () => {
                document.removeEventListener('paste', handleCaptionPaste, true);
                document.removeEventListener('keydown', handleCaptionPasteShortcut, true);
            };
        }, [activeScreen]);

        useEffect(() => {
            return () => {
                if (webcamStream) {
                    webcamStream.getTracks().forEach(track => track.stop());
                }
            };
        }, [webcamStream]);

        useEffect(() => {
            const requestKey = JSON.stringify({
                query,
                page,
                searchType: requestedSearchType,
                hasPerson,
                filters,
            });
            requestKeyRef.current = requestKey;
            setLoadingPage(true);

            const params = buildSearchParams({
                query,
                page,
                searchType: requestedSearchType,
                hasPerson,
                filters,
            });

            if (page === 0) {
                setPageDocs({});
                setPageHasMore({});
                setViewer(null);
            }

            fetch(`${domain}/image/search?${params.toString()}`)
                .then(async response => {
                    if (!response.ok) {
                        const message = await response.text();
                        throw new Error(message || `Search failed with status ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    if (requestKeyRef.current !== requestKey) {
                        return;
                    }
                    const meta = (data.meta && data.meta.length > 0) ? data.meta[0] : null;
                    const docs = data.docs || [];
                    setPageDocs(previous => ({
                        ...previous,
                        [page]: docs,
                    }));
                    setPageHasMore(previous => ({
                        ...previous,
                        [page]: !!(meta && meta.hasMore),
                    }));
                    setFacet(meta ? meta.facet : null);
                    setSearchError('');

                    if (docs.length > 0 && (!viewer || page === 0)) {
                        setViewer({ page, index: 0 });
                    }
                })
                .catch(error => {
                    if (requestKeyRef.current !== requestKey) {
                        return;
                    }
                    setPageDocs({});
                    setPageHasMore({});
                    setFacet(null);
                    setViewer(null);
                    setSearchError(error.message || 'Search failed');
                })
                .finally(() => {
                    if (requestKeyRef.current === requestKey) {
                        setLoadingPage(false);
                    }
                });
        }, [query, page, filters, hasPerson, requestedSearchType]);

        function fetchPageData(targetPage) {
            const params = buildSearchParams({
                query,
                page: targetPage,
                searchType: requestedSearchType,
                hasPerson,
                filters,
            });

            return fetch(`${domain}/image/search?${params.toString()}`)
                .then(async response => {
                    if (!response.ok) {
                        const message = await response.text();
                        throw new Error(message || `Search failed with status ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    const docs = data.docs || [];
                    const meta = (data.meta && data.meta.length > 0) ? data.meta[0] : null;
                    setPageDocs(previous => ({
                        ...previous,
                        [targetPage]: docs,
                    }));
                    setPageHasMore(previous => ({
                        ...previous,
                        [targetPage]: !!(meta && meta.hasMore),
                    }));
                    return docs;
                });
        }

        function toggleFilter(key, value, checked) {
            setPage(0);
            setFilters(previous => {
                const existing = previous[key];
                return {
                    ...previous,
                    [key]: checked
                        ? [...existing, value]
                        : existing.filter(item => item !== value)
                };
            });
        }

        function facetCount(key, value) {
            if (!facet || !facet[key] || !facet[key].buckets) {
                return 0;
            }
            const bucket = facet[key].buckets.find(entry => entry._id === value);
            return bucket ? bucket.count : 0;
        }

        function openViewer(pageNumber, indexWithinPage) {
            setViewer({ page: pageNumber, index: indexWithinPage });
            setViewMode('Full Screen');
        }

        async function changeResultPage(direction) {
            const targetPage = page + direction;
            if (targetPage < 0) {
                return;
            }

            if (viewMode !== 'Full Screen') {
                setPage(targetPage);
                return;
            }

            setLoadingViewerPage(true);
            try {
                const targetDocs = pageDocs[targetPage] || await fetchPageData(targetPage);
                setPage(targetPage);
                setViewer(targetDocs.length > 0
                    ? { page: targetPage, index: 0 }
                    : null);
            } catch (error) {
                setSearchError(error.message || 'Failed to load page');
            } finally {
                setLoadingViewerPage(false);
            }
        }

        async function moveViewer(direction) {
            if (!viewer) {
                return;
            }

            const docs = pageDocs[viewer.page] || [];
            if (direction === 'next' && viewer.index < docs.length - 1) {
                setViewer({ page: viewer.page, index: viewer.index + 1 });
                return;
            }
            if (direction === 'prev' && viewer.index > 0) {
                setViewer({ page: viewer.page, index: viewer.index - 1 });
                return;
            }

            if (direction === 'next' && !pageHasMore[viewer.page]) {
                return;
            }

            const targetPage = direction === 'next' ? viewer.page + 1 : viewer.page - 1;
            if (targetPage < 0) {
                return;
            }

            setLoadingViewerPage(true);
            try {
                const nextDocs = pageDocs[targetPage] || await fetchPageData(targetPage);
                setPage(targetPage);
                if (nextDocs.length > 0) {
                    setViewer({
                        page: targetPage,
                        index: 0,
                    });
                }
            } catch (error) {
                setSearchError(error.message || 'Failed to load more results');
            } finally {
                setLoadingViewerPage(false);
            }
        }

        async function deleteImage(image, event) {
            if (event) {
                event.stopPropagation();
            }
            if (!image || deletingImageId) {
                return;
            }

            const confirmed = window.confirm(`Delete image ${image._id}? This cannot be undone.`);
            if (!confirmed) {
                return;
            }

            setDeletingImageId(image._id);
            setSearchError('');
            try {
                const response = await fetch(`${domain}/image/delete?id=${encodeURIComponent(image._id)}`, {
                    method: 'DELETE',
                });
                if (!response.ok) {
                    const message = await response.text();
                    throw new Error(message || `Delete failed with status ${response.status}`);
                }
                const result = await response.json();
                if (!result.deleted) {
                    throw new Error('Image was not found.');
                }

                setPageDocs(previous => {
                    const next = {};
                    Object.entries(previous).forEach(([pageNumber, docs]) => {
                        next[pageNumber] = (docs || []).filter(candidate => candidate._id !== image._id);
                    });
                    return next;
                });
                setViewer(previous => {
                    if (!previous) {
                        return previous;
                    }
                    const previousDocs = pageDocs[previous.page] || [];
                    const previousViewerImage = previousDocs[previous.index] || null;
                    const remainingDocs = (pageDocs[previous.page] || [])
                        .filter(candidate => candidate._id !== image._id);
                    if (remainingDocs.length === 0) {
                        return null;
                    }
                    if (previousViewerImage && previousViewerImage._id !== image._id) {
                        const retainedIndex = remainingDocs.findIndex(candidate => candidate._id === previousViewerImage._id);
                        if (retainedIndex >= 0) {
                            return {
                                page: previous.page,
                                index: retainedIndex,
                            };
                        }
                    }
                    return {
                        page: previous.page,
                        index: Math.min(previous.index, remainingDocs.length - 1),
                    };
                });
            } catch (error) {
                setSearchError(error.message || 'Failed to delete image');
            } finally {
                setDeletingImageId(null);
            }
        }

        const viewerImage = useMemo(() => {
            if (!viewer) {
                return null;
            }
            const docs = pageDocs[viewer.page] || [];
            return docs[viewer.index] || null;
        }, [viewer, pageDocs]);

        const canMovePrev = !!viewer && (viewer.index > 0 || viewer.page > 0);
        const canMoveNext = !!viewer && viewerImage && (
            viewer.index < ((pageDocs[viewer.page] || []).length - 1) || !!pageHasMore[viewer.page]
        );

        function openCaptionImageScreen() {
            previousScreenRef.current = activeScreen;
            clearCaptionImageInput();
            setCaptionResult(null);
            setCaptionAddLoading(false);
            setCaptionSavedImage(null);
            setCaptionError('');
            setWebcamError('');
            setActiveScreen('Caption Image');
        }

        function clearCaptionImageInput() {
            setCaptionImageUrl('');
            setCaptionImageBase64('');
            setCaptionImageMimeType('');
            setCaptionPreviewUrl('');
        }

        function setCaptionImageFromDataUrl(dataUrl, mimeType) {
            setCaptionResult(null);
            setCaptionError('');
            setWebcamError('');
            const parts = String(dataUrl || '').split(',');
            setCaptionImageBase64(parts.length > 1 ? parts[1] : '');
            setCaptionImageMimeType(mimeType || 'image/jpeg');
            setCaptionPreviewUrl(String(dataUrl || ''));
            setCaptionImageUrl('');
        }

        function handleCaptionFile(file) {
            setCaptionResult(null);
            setCaptionError('');
            setWebcamError('');
            if (!file) {
                clearCaptionImageInput();
                return;
            }

            const reader = new FileReader();
            reader.onload = () => {
                setCaptionImageFromDataUrl(reader.result || '', file.type || 'image/jpeg');
            };
            reader.onerror = () => setCaptionError('Failed to read the selected image.');
            reader.readAsDataURL(file);
        }

        function handleCaptionPaste(event) {
            if (activeScreen !== 'Caption Image') {
                return;
            }

            const clipboardData = event.clipboardData;
            if (!clipboardData) {
                return;
            }

            const imageItem = Array.from(clipboardData.items || [])
                .find(item => item.type && item.type.startsWith('image/'));
            if (imageItem) {
                event.preventDefault();
                handleCaptionFile(imageItem.getAsFile());
                return;
            }

            const text = clipboardData.getData('text/plain');
            if (text && /^https?:\/\//i.test(text.trim())) {
                event.preventDefault();
                setCaptionImageUrl(text.trim());
                setCaptionImageBase64('');
                setCaptionImageMimeType('');
                setCaptionPreviewUrl(text.trim());
                setCaptionResult(null);
                setCaptionError('');
                setWebcamError('');
            }
        }

        function handleCaptionPasteShortcut(event) {
            if (activeScreen !== 'Caption Image') {
                return;
            }
            if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === 'v') {
                event.preventDefault();
                readImageFromClipboard();
            }
        }

        async function readImageFromClipboard() {
            setCaptionError('');
            setWebcamError('');
            if (!navigator.clipboard || !navigator.clipboard.read) {
                setCaptionError('Clipboard image reading is not available in this browser.');
                return;
            }

            try {
                const items = await navigator.clipboard.read();
                for (const item of items) {
                    const imageType = item.types.find(type => type.startsWith('image/'));
                    if (imageType) {
                        const blob = await item.getType(imageType);
                        handleCaptionFile(new File([blob], 'clipboard-image', { type: imageType }));
                        return;
                    }

                    if (item.types.includes('text/plain')) {
                        const blob = await item.getType('text/plain');
                        const text = (await blob.text()).trim();
                        if (/^https?:\/\//i.test(text)) {
                            setCaptionImageUrl(text);
                            setCaptionImageBase64('');
                            setCaptionImageMimeType('');
                            setCaptionPreviewUrl(text);
                            setCaptionResult(null);
                            return;
                        }
                    }
                }
                setCaptionError('Clipboard does not contain an image or image URL.');
            } catch (error) {
                setCaptionError(error.message || 'Failed to read from the clipboard.');
            }
        }

        async function startWebcam() {
            setWebcamError('');
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                setWebcamError('Webcam capture is not available in this browser.');
                return;
            }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' },
                    audio: false,
                });
                setWebcamStream(stream);
            } catch (error) {
                setWebcamError(error.message || 'Unable to access the webcam.');
            }
        }

        function stopWebcam() {
            if (webcamStream) {
                webcamStream.getTracks().forEach(track => track.stop());
            }
            setWebcamStream(null);
        }

        function captureWebcamImage() {
            const video = webcamVideoRef.current;
            const canvas = webcamCanvasRef.current;
            if (!video || !canvas || !video.videoWidth || !video.videoHeight) {
                setWebcamError('Webcam image is not ready yet.');
                return;
            }

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            setCaptionImageFromDataUrl(canvas.toDataURL('image/jpeg', 0.92), 'image/jpeg');
            stopWebcam();
        }

        async function submitCaptionImage() {
            setCaptionLoading(true);
            setCaptionError('');
            setCaptionResult(null);
            setCaptionAddLoading(false);
            setCaptionSavedImage(null);
            try {
                const payload = captionImageBase64
                    ? { imageBase64: captionImageBase64, mimeType: captionImageMimeType }
                    : { imageUrl: captionImageUrl.trim() };
                if (!payload.imageBase64 && !payload.imageUrl) {
                    throw new Error('Provide an image URL or choose an image file.');
                }

                const response = await fetch(`${domain}/image/caption`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                if (!response.ok) {
                    const message = await response.text();
                    throw new Error(message || `Captioning failed with status ${response.status}`);
                }
                const data = await response.json();
                setCaptionResult(data);
                if (payload.imageUrl) {
                    setCaptionPreviewUrl(payload.imageUrl);
                }
                stopWebcam();
            } catch (error) {
                setCaptionError(error.message || 'Captioning failed');
            } finally {
                setCaptionLoading(false);
            }
        }

        async function addCaptionedImage() {
            if (!captionResult) {
                return;
            }

            setCaptionAddLoading(true);
            setCaptionError('');
            try {
                const previewImage = captionPreviewRef.current;
                const response = await fetch(`${domain}/image/add`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        imageUrl: captionPreviewUrl,
                        width: previewImage ? previewImage.naturalWidth : 0,
                        height: previewImage ? previewImage.naturalHeight : 0,
                        captionResult,
                    }),
                });
                if (!response.ok) {
                    const message = await response.text();
                    throw new Error(message || `Add failed with status ${response.status}`);
                }
                const savedImage = await response.json();
                setPage(0);
                setQuery(savedImage.caption || captionResult.caption);
                setPageDocs({ 0: [savedImage] });
                setPageHasMore({ 0: false });
                setViewer({ page: 0, index: 0 });
                setSearchError('');
                setCaptionSavedImage(savedImage);
            } catch (error) {
                setCaptionError(error.message || 'Failed to add image');
            } finally {
                setCaptionAddLoading(false);
            }
        }

        function backFromCaptionImageScreen() {
            stopWebcam();
            setActiveScreen(previousScreenRef.current || 'Search');
        }

        return (
            <div className="app-shell">
                <header className="toolbar">
                    <div className="brand-lockup">
                        <h1 className="brand-title">Atlas Coco</h1>
                        <div className="brand-subtitle">Caption search, semantic retrieval, and browsable image discovery.</div>
                    </div>
                    <div className="toolbar-search">
                        <TextField
                            fullWidth
                            variant="outlined"
                            label="Search"
                            placeholder={searchPlaceholder}
                            value={query}
                            onChange={event => {
                                setPage(0);
                                setQuery(event.target.value);
                            }}
                            InputProps={{
                                style: {
                                    background: 'rgba(255,255,255,0.88)',
                                    borderRadius: 18,
                                    fontSize: '1rem',
                                }
                            }}
                        />
                    </div>
                </header>

                <main className="workspace">
                    <aside className="sidebar">
                        {lmStudioCaptioningEnabled && (
                            <div className="sidebar-add-image">
                                {activeScreen === 'Caption Image' ? (
                                    <Button
                                        className="back-button"
                                        variant="outlined"
                                        onClick={backFromCaptionImageScreen}
                                    >
                                        Back
                                    </Button>
                                ) : (
                                    <Button
                                        className="add-image-button"
                                        variant="contained"
                                        onClick={openCaptionImageScreen}
                                    >
                                        <span className="plus-icon">+</span>
                                        Add Image
                                    </Button>
                                )}
                            </div>
                        )}

                        {activeScreen === 'Search' && (
                            <React.Fragment>
                                <div className="filter-group">
                                    <div className="section-label">View</div>
                                    <FormControl component="fieldset">
                                        <RadioGroup value={viewMode} onChange={event => setViewMode(event.target.value)}>
                                            <FormControlLabel value="Full Screen" control={<Radio />} label="Full Screen" />
                                            <FormControlLabel value="Grid" control={<Radio />} label="Grid" />
                                        </RadioGroup>
                                    </FormControl>
                                </div>

                                <div className="filter-group">
                                    <div className="section-label">People Filter</div>
                                    <FormControl component="fieldset">
                                        <RadioGroup value={hasPerson} onChange={event => {
                                            setPage(0);
                                            setHasPerson(event.target.value);
                                        }}>
                                            <FormControlLabel value="any" control={<Radio />} label="Any Person" />
                                            <FormControlLabel value="true" control={<Radio />} label="Has Person" />
                                            <FormControlLabel value="false" control={<Radio />} label="No Person" />
                                        </RadioGroup>
                                    </FormControl>
                                </div>

                                <div className="filter-group">
                                    <div className="section-label">Categories</div>
                                    {FILTER_KEYS.map(key => (
                                        <Box key={key} sx={{ marginBottom: 2 }}>
                                            <Typography style={{ fontWeight: 800, marginBottom: 6 }}>{toTitleCase(key)}</Typography>
                                            {optionsByFilter[key].map(value => (
                                                <FormControl key={`${key}.${value}`} style={{ display: 'block' }}>
                                                    <FormControlLabel
                                                        control={
                                                            <Checkbox
                                                                checked={filters[key].includes(value)}
                                                                onChange={event => toggleFilter(key, value, event.target.checked)}
                                                            />
                                                        }
                                                        label={showFacetCounts ? `${value} (${facetCount(key, value)})` : value}
                                                    />
                                                </FormControl>
                                            ))}
                                        </Box>
                                    ))}
                                </div>

                                {vectorSearchEnabled && (
                                    <div className="filter-group">
                                        <div className="section-label">Search Type</div>
                                        <FormControl component="fieldset">
                                            <RadioGroup value={searchTypeSelection} onChange={event => {
                                                setPage(0);
                                                setSearchTypeSelection(event.target.value);
                                            }}>
                                                <FormControlLabel value="Text" control={<Radio />} label="Text" />
                                                <FormControlLabel value="Vector" control={<Radio />} label="Vector" />
                                                <FormControlLabel value="Combined" control={<Radio />} label="Combined" />
                                            </RadioGroup>
                                        </FormControl>
                                    </div>
                                )}
                            </React.Fragment>
                        )}
                    </aside>

                    <section className="content-panel">
                        <div className="content-header">
                            <div>
                                <Typography variant="h6" style={{ fontFamily: 'Fraunces, serif' }}>
                                    {activeScreen === 'Caption Image'
                                        ? 'Caption Image'
                                        : (viewMode === 'Grid' ? 'Search Results' : 'Focused Result')}
                                </Typography>
                                <Typography variant="body2" color="textSecondary">
                                    {activeScreen === 'Caption Image'
                                        ? 'Generate local metadata with LM Studio'
                                        : vectorSearchEnabled
                                            ? `${effectiveSearchLabel} - ${PAGE_SIZE} per page`
                                            : `${PAGE_SIZE} per page`}
                                </Typography>
                                {searchError && (
                                    <Typography variant="body2" style={{ color: '#b00020', marginTop: 6 }}>
                                        {searchError}
                                    </Typography>
                                )}
                            </div>

                            {activeScreen === 'Search' && (
                                <div className="nav-row">
                                    {loadingPage && (
                                        <Box sx={{ display: 'flex', alignItems: 'center', gap: 1 }}>
                                            <CircularProgress size={18} />
                                            <Typography variant="body2" color="textSecondary">Refreshing</Typography>
                                        </Box>
                                    )}

                                    <Box sx={{ display: 'flex', alignItems: 'center', gap: 1 }}>
                                        <Button variant="outlined" disabled={page === 0 || loadingViewerPage} onClick={() => changeResultPage(-1)}>
                                            Previous Page
                                        </Button>
                                        <Button variant="outlined" disabled={!currentPageHasMore || loadingViewerPage} onClick={() => changeResultPage(1)}>
                                            Next Page
                                        </Button>
                                    </Box>
                                </div>
                            )}
                        </div>

                        <div className="results-body">
                            {activeScreen === 'Caption Image' ? (
                                <div className="upload-screen">
                                    <div className="upload-form">
                                        <div
                                            className="paste-target"
                                            tabIndex="0"
                                            contentEditable="true"
                                            suppressContentEditableWarning={true}
                                            onPaste={handleCaptionPaste}
                                        >
                                            Paste an image from the clipboard, paste an image URL, choose a file, or capture from the webcam.
                                        </div>

                                        <TextField
                                            fullWidth
                                            variant="outlined"
                                            label="Image URL"
                                            value={captionImageUrl}
                                            onPaste={handleCaptionPaste}
                                            onChange={event => {
                                                setCaptionImageUrl(event.target.value);
                                                setCaptionImageBase64('');
                                                setCaptionPreviewUrl(event.target.value);
                                                setCaptionResult(null);
                                                setCaptionError('');
                                            }}
                                        />

                                        <div className="upload-actions">
                                            <Button variant="outlined" component="label">
                                                Choose Image File
                                                <input
                                                    type="file"
                                                    accept="image/*"
                                                    hidden
                                                    onChange={event => handleCaptionFile(event.target.files[0])}
                                                />
                                            </Button>

                                            <Button variant="outlined" onClick={readImageFromClipboard}>
                                                Paste Clipboard
                                            </Button>

                                            {webcamStream ? (
                                                <React.Fragment>
                                                    <Button variant="outlined" onClick={captureWebcamImage}>
                                                        Capture
                                                    </Button>
                                                    <Button variant="outlined" onClick={stopWebcam}>
                                                        Stop Webcam
                                                    </Button>
                                                </React.Fragment>
                                            ) : (
                                                <Button variant="outlined" onClick={startWebcam}>
                                                    Use Webcam
                                                </Button>
                                            )}
                                        </div>

                                        {webcamStream && (
                                            <React.Fragment>
                                                <video
                                                    ref={webcamVideoRef}
                                                    className="webcam-video"
                                                    autoPlay
                                                    muted
                                                    playsInline
                                                />
                                                <canvas ref={webcamCanvasRef} style={{ display: 'none' }} />
                                            </React.Fragment>
                                        )}

                                        {webcamError && (
                                            <Typography variant="body2" style={{ color: '#b00020' }}>
                                                {webcamError}
                                            </Typography>
                                        )}

                                        <Button
                                            variant="contained"
                                            color="primary"
                                            disabled={captionLoading}
                                            onClick={submitCaptionImage}
                                        >
                                            {captionLoading ? 'Captioning' : 'Create Caption'}
                                        </Button>

                                        {captionLoading && (
                                            <Box sx={{ display: 'flex', alignItems: 'center', gap: 1 }}>
                                                <CircularProgress size={18} />
                                                <Typography variant="body2" color="textSecondary">Running local model</Typography>
                                            </Box>
                                        )}

                                        {captionError && (
                                            <Typography variant="body2" style={{ color: '#b00020' }}>
                                                {captionError}
                                            </Typography>
                                        )}

                                        {captionPreviewUrl && (
                                            <img ref={captionPreviewRef} className="upload-preview" src={captionPreviewUrl} alt="Upload preview" />
                                        )}
                                    </div>

                                    <div className="upload-result">
                                        {captionResult ? (
                                            <React.Fragment>
                                                <h2 className="full-screen-caption">{captionResult.caption}</h2>
                                                <Box sx={{ marginTop: 2, marginBottom: 2 }}>
                                                    <Button
                                                        variant="contained"
                                                        color="primary"
                                                        disabled={captionAddLoading || !!captionSavedImage}
                                                        onClick={addCaptionedImage}
                                                    >
                                                        {captionAddLoading ? 'Adding' : captionSavedImage ? 'Added' : 'Add'}
                                                    </Button>
                                                </Box>
                                                {captionSavedImage && (
                                                    <Typography variant="body2" color="textSecondary">
                                                        Added. It may take a moment to appear in Atlas Search.
                                                    </Typography>
                                                )}
                                                <div className="full-screen-meta">
                                                    <div>{captionResult.hasPerson ? 'Contains a person' : 'No person detected'}</div>
                                                    <div>{`Vision model: ${captionResult.visionModel}`}</div>
                                                    <div>{`Embedding model: ${captionResult.captionEmbeddingModel}`}</div>
                                                </div>

                                                <Box sx={{ marginTop: 2, marginBottom: 2 }}>
                                                    <div className="section-label">Labels</div>
                                                    <div className="chip-cloud">
                                                        {((captionResult.typedLabels || []).length > 0
                                                                ? captionResult.typedLabels.map(label => `${label.type}: ${label.label}`)
                                                                : (captionResult.labels || [])
                                                        ).map(label => (
                                                            <Chip key={`label.${label}`} label={label} />
                                                        ))}
                                                    </div>
                                                </Box>

                                                <Box sx={{ marginBottom: 2 }}>
                                                    <div className="section-label">Category Labels</div>
                                                    <div className="chip-cloud">
                                                        {Object.entries(captionResult.categoryLabels || {}).flatMap(([key, values]) =>
                                                            (values || []).map(value => (
                                                                <Chip key={`category.${key}.${value}`} label={`${key}: ${value}`} />
                                                            ))
                                                        )}
                                                    </div>
                                                </Box>

                                                <div className="section-label">Caption Embedding</div>
                                                <div className="embedding-preview">
                                                    {JSON.stringify(captionResult.captionEmbedding || [])}
                                                </div>
                                            </React.Fragment>
                                        ) : (
                                            <Typography variant="body1" color="textSecondary">
                                                Generated caption, labels, and embedding will appear here.
                                            </Typography>
                                        )}
                                    </div>
                                </div>
                            ) : viewMode === 'Grid' ? (
                                <div className="results-grid">
                                    {currentPageDocs.map((image, index) => (
                                        <article
                                            key={`image.${image._id}`}
                                            className="result-card"
                                            onClick={() => openViewer(page, index)}
                                        >
                                            <img className="result-thumb" src={image.url} alt={image.caption} />
                                            <div className="result-caption">{image.caption}</div>
                                            <div className="card-meta">
                                                {image.hasPerson ? 'Contains a person' : 'No person detected'}
                                            </div>
                                            <div className="card-meta">{`${image.width} x ${image.height}`}</div>
                                            <div className="chip-cloud">
                                                {FILTER_KEYS.flatMap(key =>
                                                    (image[key] || []).map(value => (
                                                        <Chip
                                                            key={`${image._id}.${key}.${value}`}
                                                            size="small"
                                                            label={`${key}: ${value}`}
                                                        />
                                                    ))
                                                )}
                                            </div>
                                        </article>
                                    ))}
                                </div>
                            ) : viewerImage ? (
                                <div className="full-screen-view">
                                    <div className="full-screen-stage">
                                        <img className="full-screen-image" src={viewerImage.url} alt={viewerImage.caption} />
                                    </div>

                                    <div className="full-screen-sidebar">
                                        <div className="nav-row">
                                            <Button variant="outlined" disabled={!canMovePrev || loadingViewerPage} onClick={() => moveViewer('prev')}>
                                                Previous
                                            </Button>
                                            <Button variant="outlined" disabled={!canMoveNext || loadingViewerPage} onClick={() => moveViewer('next')}>
                                                Next
                                            </Button>
                                        </div>

                                        <h2 className="full-screen-caption">{viewerImage.caption}</h2>

                                        <div className="full-screen-meta">
                                            <div>{viewerImage.hasPerson ? 'Contains a person' : 'No person detected'}</div>
                                            <div>{`${viewerImage.width} x ${viewerImage.height}`}</div>
                                        </div>

                                        <div className="chip-cloud">
                                            {FILTER_KEYS.flatMap(key =>
                                                (viewerImage[key] || []).map(value => (
                                                    <Chip
                                                        key={`viewer.${viewerImage._id}.${key}.${value}`}
                                                        label={`${key}: ${value}`}
                                                    />
                                                ))
                                            )}
                                        </div>

                                        {loadingViewerPage && (
                                            <Box sx={{ display: 'flex', alignItems: 'center', gap: 1 }}>
                                                <CircularProgress size={18} />
                                                <Typography variant="body2" color="textSecondary">
                                                    Loading more results…
                                                </Typography>
                                            </Box>
                                        )}

                                        <div className="full-screen-delete-row">
                                            <Button
                                                className="delete-image-button"
                                                variant="outlined"
                                                disabled={deletingImageId === viewerImage._id}
                                                onClick={event => deleteImage(viewerImage, event)}
                                            >
                                                {deletingImageId === viewerImage._id ? 'Deleting' : 'Delete Image'}
                                            </Button>
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <Box sx={{ paddingTop: 4 }}>
                                    <Typography variant="body1" color="textSecondary">
                                        Select a result to inspect it in full-screen mode.
                                    </Typography>
                                </Box>
                            )}
                        </div>
                    </section>
                </main>
            </div>
        );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
