<!DOCTYPE html>
<html>
<head>
    <title>MongoDB Atlas Search Service</title>
    <script src="https://unpkg.com/react@17/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@material-ui/core@latest/umd/material-ui.development.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" />
    <style>
        :root {
            --surface: #ffffff;
            --surface-muted: #f5f2ec;
            --surface-strong: #f2ece3;
            --stroke: #ddd3c6;
            --text: #1e1b18;
            --text-muted: #6d655b;
            --accent: #c44b1c;
            --accent-soft: rgba(196, 75, 28, 0.12);
        }

        body {
            margin: 0;
            padding: 16px;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(196, 75, 28, 0.10), transparent 28%),
                radial-gradient(circle at top right, rgba(34, 94, 83, 0.10), transparent 24%),
                linear-gradient(180deg, #fbf8f4 0%, #f7f2ea 100%);
            font-family: "Roboto", sans-serif;
        }

        .result-row {
            display: flex;
            gap: 16px;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid var(--stroke);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.82);
            box-shadow: 0 10px 30px rgba(52, 38, 20, 0.06);
            cursor: pointer;
            transition: transform 140ms ease, box-shadow 140ms ease, border-color 140ms ease;
        }

        .result-row:hover {
            transform: translateY(-2px);
            border-color: rgba(196, 75, 28, 0.45);
            box-shadow: 0 16px 32px rgba(52, 38, 20, 0.10);
        }

        .result-image {
            width: 240px;
            max-width: 100%;
            object-fit: cover;
            border-radius: 12px;
            background: var(--surface-muted);
        }

        .viewer-image {
            display: block;
            max-width: min(100%, 1400px);
            max-height: 72vh;
            width: auto;
            height: auto;
            margin: 0 auto;
            border-radius: 18px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.22);
            background: #f7f2ea;
        }

        .viewer-arrow {
            min-width: 56px;
            width: 56px;
            height: 56px;
            border-radius: 999px;
            border: none;
            background: rgba(255, 255, 255, 0.92);
            color: var(--text);
            font-size: 28px;
            line-height: 1;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
            cursor: pointer;
        }

        .viewer-arrow:disabled {
            opacity: 0.35;
            cursor: default;
            box-shadow: none;
        }

        @media (max-width: 900px) {
            .result-row {
                flex-direction: column;
            }

            .result-image {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;
    const {
        Typography,
        Checkbox,
        Radio,
        RadioGroup,
        FormControlLabel,
        FormControl,
        TextField,
        Box,
        Grid,
        Button,
        Chip,
        Dialog,
        CircularProgress,
    } = MaterialUI;

    const FILTER_KEYS = [
        'animal',
        'appliance',
        'electronic',
        'food',
        'furniture',
        'indoor',
        'kitchen',
        'outdoor',
        'sports',
        'vehicle'
    ];
    const PAGE_SIZE = 5;

    function toTitleCase(value) {
        return value.charAt(0).toUpperCase() + value.slice(1);
    }

    function createEmptyFilterState() {
        return FILTER_KEYS.reduce((acc, key) => {
            acc[key] = [];
            return acc;
        }, {});
    }

    function buildSearchParams({ query, page, searchTypes, hasPerson, filters }) {
        const params = new URLSearchParams();
        params.set('text', query.trim() || 'a');
        params.set('page', String(page));

        searchTypes.forEach(searchType => params.append('searchType', searchType));

        if (hasPerson === 'true' || hasPerson === 'false') {
            params.set('hasPerson', hasPerson);
        }

        FILTER_KEYS.forEach(key => {
            if (filters[key].length > 0) {
                params.set(key, filters[key].join(','));
            }
        });

        return params;
    }

    function App() {
        const [query, setQuery] = useState('');
        const [page, setPage] = useState(0);
        const [pageDocs, setPageDocs] = useState({});
        const [facet, setFacet] = useState(null);
        const [total, setTotal] = useState(0);
        const [filters, setFilters] = useState(createEmptyFilterState());
        const [optionsByFilter, setOptionsByFilter] = useState(createEmptyFilterState());
        const [hasPerson, setHasPerson] = useState('any');
        const [searchTypes, setSearchTypes] = useState(['Text']);
        const [vectorSearchEnabled, setVectorSearchEnabled] = useState(false);
        const [searchError, setSearchError] = useState('');
        const [loadingPage, setLoadingPage] = useState(false);
        const [viewer, setViewer] = useState(null);
        const [loadingViewerPage, setLoadingViewerPage] = useState(false);
        const requestKeyRef = useRef('');

        const domain = document.location.host.includes('localhost') ? 'http://localhost:8222' : '';

        const currentPageDocs = pageDocs[page] || [];
        const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));

        useEffect(() => {
            fetch(`${domain}/capabilities`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Failed to load search capabilities');
                    }
                    return response.json();
                })
                .then(data => {
                    setVectorSearchEnabled(!!data.vectorSearchEnabled);
                })
                .catch(error => {
                    setSearchError(error.message || 'Failed to load search capabilities');
                });
        }, []);

        useEffect(() => {
            fetch(`${domain}/categories`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Failed to load categories');
                    }
                    return response.json();
                })
                .then(data => {
                    const grouped = createEmptyFilterState();
                    data.forEach(category => {
                        const key = category.superCategory;
                        if (FILTER_KEYS.includes(key)) {
                            grouped[key].push(category.name);
                        }
                    });
                    FILTER_KEYS.forEach(key => {
                        grouped[key] = Array.from(new Set(grouped[key])).sort();
                    });
                    setOptionsByFilter(grouped);
                })
                .catch(error => {
                    setSearchError(error.message || 'Failed to load categories');
                });
        }, []);

        useEffect(() => {
            if (!vectorSearchEnabled && searchTypes.includes('Vector')) {
                setSearchTypes(['Text']);
            }
        }, [vectorSearchEnabled]);

        useEffect(() => {
            const activeSearchTypes = vectorSearchEnabled ? searchTypes : ['Text'];
            const requestKey = JSON.stringify({
                query,
                page,
                searchTypes: activeSearchTypes,
                hasPerson,
                filters,
            });
            requestKeyRef.current = requestKey;
            setLoadingPage(true);

            const params = buildSearchParams({
                query,
                page,
                searchTypes: activeSearchTypes,
                hasPerson,
                filters,
            });

            if (page === 0) {
                setPageDocs({});
                setViewer(null);
            }

            fetch(`${domain}/image/search?${params.toString()}`)
                .then(async response => {
                    if (!response.ok) {
                        const message = await response.text();
                        throw new Error(message || `Search failed with status ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    if (requestKeyRef.current !== requestKey) {
                        return;
                    }
                    const meta = (data.meta && data.meta.length > 0) ? data.meta[0] : null;
                    setPageDocs(previous => ({
                        ...previous,
                        [page]: data.docs || [],
                    }));
                    setFacet(meta ? meta.facet : null);
                    setTotal(meta && meta.count ? meta.count.total : 0);
                    setSearchError('');
                })
                .catch(error => {
                    if (requestKeyRef.current !== requestKey) {
                        return;
                    }
                    setPageDocs({});
                    setFacet(null);
                    setTotal(0);
                    setViewer(null);
                    setSearchError(error.message || 'Search failed');
                })
                .finally(() => {
                    if (requestKeyRef.current === requestKey) {
                        setLoadingPage(false);
                    }
                });
        }, [query, page, filters, hasPerson, searchTypes, vectorSearchEnabled]);

        function fetchPageData(targetPage) {
            const activeSearchTypes = vectorSearchEnabled ? searchTypes : ['Text'];
            const params = buildSearchParams({
                query,
                page: targetPage,
                searchTypes: activeSearchTypes,
                hasPerson,
                filters,
            });

            return fetch(`${domain}/image/search?${params.toString()}`)
                .then(async response => {
                    if (!response.ok) {
                        const message = await response.text();
                        throw new Error(message || `Search failed with status ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    const meta = (data.meta && data.meta.length > 0) ? data.meta[0] : null;
                    setPageDocs(previous => ({
                        ...previous,
                        [targetPage]: data.docs || [],
                    }));
                    if (meta && meta.count) {
                        setTotal(meta.count.total);
                    }
                    return data.docs || [];
                });
        }

        function toggleSearchType(type, checked) {
            setPage(0);
            setSearchTypes(previous => {
                const next = checked
                    ? Array.from(new Set([...previous, type]))
                    : previous.filter(item => item !== type);
                return next.length === 0 ? ['Text'] : next;
            });
        }

        function toggleFilter(key, value, checked) {
            setPage(0);
            setFilters(previous => {
                const existing = previous[key];
                return {
                    ...previous,
                    [key]: checked
                        ? [...existing, value]
                        : existing.filter(item => item !== value)
                };
            });
        }

        function facetCount(key, value) {
            if (!facet || !facet[key] || !facet[key].buckets) {
                return 0;
            }
            const bucket = facet[key].buckets.find(entry => entry._id === value);
            return bucket ? bucket.count : 0;
        }

        function openViewer(pageNumber, indexWithinPage) {
            setViewer({ page: pageNumber, index: indexWithinPage });
        }

        function closeViewer() {
            setViewer(null);
        }

        async function moveViewer(direction) {
            if (!viewer) {
                return;
            }

            const docs = pageDocs[viewer.page] || [];
            if (direction === 'next' && viewer.index < docs.length - 1) {
                setViewer({ page: viewer.page, index: viewer.index + 1 });
                return;
            }
            if (direction === 'prev' && viewer.index > 0) {
                setViewer({ page: viewer.page, index: viewer.index - 1 });
                return;
            }

            const targetPage = direction === 'next' ? viewer.page + 1 : viewer.page - 1;
            if (targetPage < 0 || targetPage >= totalPages) {
                return;
            }

            setLoadingViewerPage(true);
            try {
                const nextDocs = pageDocs[targetPage] || await fetchPageData(targetPage);
                setPage(targetPage);
                setViewer({
                    page: targetPage,
                    index: direction === 'next' ? 0 : Math.max(0, nextDocs.length - 1),
                });
            } catch (error) {
                setSearchError(error.message || 'Failed to load more results');
            } finally {
                setLoadingViewerPage(false);
            }
        }

        const viewerImage = useMemo(() => {
            if (!viewer) {
                return null;
            }
            const docs = pageDocs[viewer.page] || [];
            return docs[viewer.index] || null;
        }, [viewer, pageDocs]);

        const canMovePrev = !!viewer && (viewer.index > 0 || viewer.page > 0);
        const canMoveNext = !!viewer && (
            viewerImage && (
                viewer.index < ((pageDocs[viewer.page] || []).length - 1)
                || viewer.page + 1 < totalPages
            )
        );

        return (
            <div tabIndex="0">
                <Grid container spacing={2}>
                    <Grid item xs={12}>
                        <Typography variant="h5" component="h1">
                            MongoDB Atlas Search Service
                        </Typography>
                        <Typography variant="body2" component="p" color="textSecondary">
                            Search COCO image captions and filter by detected object categories.
                        </Typography>
                    </Grid>

                    <Grid item xs={12}>
                        <Box sx={{ display: 'flex', gap: 2, flexWrap: 'wrap', alignItems: 'center' }}>
                            <TextField
                                sx={{ flexGrow: 1, minWidth: 280 }}
                                label="Caption Search"
                                value={query}
                                onChange={event => {
                                    setPage(0);
                                    setQuery(event.target.value);
                                }}
                            />
                            <FormControl component="fieldset">
                                <RadioGroup row value={hasPerson} onChange={event => {
                                    setPage(0);
                                    setHasPerson(event.target.value);
                                }}>
                                    <FormControlLabel value="any" control={<Radio />} label="Any Person" />
                                    <FormControlLabel value="true" control={<Radio />} label="Has Person" />
                                    <FormControlLabel value="false" control={<Radio />} label="No Person" />
                                </RadioGroup>
                            </FormControl>
                        </Box>

                        {vectorSearchEnabled && (
                            <Box sx={{ marginTop: 1, display: 'flex', gap: 2, flexWrap: 'wrap', alignItems: 'center' }}>
                                <Typography variant="body2" color="textSecondary">Search Type</Typography>
                                <FormControlLabel
                                    control={
                                        <Checkbox
                                            checked={searchTypes.includes('Text')}
                                            onChange={event => toggleSearchType('Text', event.target.checked)}
                                        />
                                    }
                                    label="Text"
                                />
                                <FormControlLabel
                                    control={
                                        <Checkbox
                                            checked={searchTypes.includes('Vector')}
                                            onChange={event => toggleSearchType('Vector', event.target.checked)}
                                        />
                                    }
                                    label="Vector"
                                />
                            </Box>
                        )}

                        <Box sx={{ marginTop: 1, minHeight: 28 }}>
                            {loadingPage && <Typography color="textSecondary">Refreshing results…</Typography>}
                            {!loadingPage && <Typography color="error">{searchError}</Typography>}
                        </Box>
                    </Grid>

                    <Grid item xs={12} md={3}>
                        <Box sx={{ display: 'flex', flexDirection: 'column', gap: 1 }}>
                            {FILTER_KEYS.map(key => (
                                <Box key={key}>
                                    <Typography color="textSecondary">{toTitleCase(key)}</Typography>
                                    {optionsByFilter[key].map(value => (
                                        <FormControl key={`${key}.${value}`}>
                                            <FormControlLabel
                                                control={
                                                    <Checkbox
                                                        checked={filters[key].includes(value)}
                                                        onChange={event => toggleFilter(key, value, event.target.checked)}
                                                        name={`${key}.${value}`}
                                                    />
                                                }
                                                label={`${value} (${facetCount(key, value)})`}
                                            />
                                        </FormControl>
                                    ))}
                                </Box>
                            ))}
                        </Box>
                    </Grid>

                    <Grid item xs={12} md={9}>
                        <Box sx={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 1, gap: 2, flexWrap: 'wrap' }}>
                            <Typography variant="subtitle1">
                                {vectorSearchEnabled
                                    ? `Results: ${total} (${searchTypes.join(' + ')})`
                                    : `Results: ${total}`}
                            </Typography>
                            <Box sx={{ display: 'flex', alignItems: 'center', gap: 1 }}>
                                <Button variant="outlined" disabled={page === 0} onClick={() => setPage(page - 1)}>
                                    Previous
                                </Button>
                                <Typography variant="body2">{`Page ${page + 1} / ${totalPages}`}</Typography>
                                <Button
                                    variant="outlined"
                                    disabled={page + 1 >= totalPages}
                                    onClick={() => setPage(page + 1)}
                                >
                                    Next
                                </Button>
                            </Box>
                        </Box>

                        {currentPageDocs.map((image, index) => (
                            <div
                                key={`image.${image._id}`}
                                className="result-row"
                                onClick={() => openViewer(page, index)}
                            >
                                <img className="result-image" src={image.url} alt={image.caption} />
                                <Box sx={{ minWidth: 0 }}>
                                    <Typography variant="body1">{image.caption}</Typography>
                                    <Typography variant="body2" color="textSecondary">
                                        {image.hasPerson ? 'Contains a person' : 'No person detected'}
                                    </Typography>
                                    <Typography variant="caption" color="textSecondary">
                                        {`${image.width} × ${image.height}`}
                                    </Typography>
                                    <Box sx={{ marginTop: 1, display: 'flex', flexWrap: 'wrap', gap: 0.5 }}>
                                        {FILTER_KEYS.map(key =>
                                            (image[key] || []).map(value => (
                                                <Chip key={`${image._id}.${key}.${value}`} size="small" label={`${key}: ${value}`} />
                                            ))
                                        )}
                                    </Box>
                                </Box>
                            </div>
                        ))}
                    </Grid>
                </Grid>

                <Dialog open={!!viewerImage} onClose={closeViewer} maxWidth={false} fullWidth PaperProps={{
                    style: {
                        background: 'linear-gradient(180deg, #f7f2ea 0%, #fffaf2 100%)',
                        borderRadius: 24,
                        padding: 0,
                        overflow: 'hidden',
                        maxWidth: 'min(96vw, 1600px)',
                    }
                }}>
                    {viewerImage && (
                        <Box sx={{ position: 'relative', padding: { xs: 2, md: 4 } }}>
                            <Box sx={{ position: 'absolute', top: 18, right: 18 }}>
                                <Button onClick={closeViewer}>Close</Button>
                            </Box>

                            <Box sx={{ display: 'flex', alignItems: 'center', gap: { xs: 1, md: 2 } }}>
                                <button className="viewer-arrow" onClick={() => moveViewer('prev')} disabled={!canMovePrev || loadingViewerPage}>
                                    &#8249;
                                </button>

                                <Box sx={{ flexGrow: 1 }}>
                                    <img className="viewer-image" src={viewerImage.url} alt={viewerImage.caption} />
                                </Box>

                                <button className="viewer-arrow" onClick={() => moveViewer('next')} disabled={!canMoveNext || loadingViewerPage}>
                                    &#8250;
                                </button>
                            </Box>

                            <Box sx={{ marginTop: 3, paddingX: { xs: 1, md: 4 } }}>
                                <Typography variant="overline" color="textSecondary">
                                    {`Result ${viewer.page * PAGE_SIZE + viewer.index + 1} of ${total}`}
                                </Typography>
                                <Typography variant="h6" component="h2">
                                    {viewerImage.caption}
                                </Typography>
                                <Typography variant="body2" color="textSecondary">
                                    {viewerImage.hasPerson ? 'Contains a person' : 'No person detected'}
                                </Typography>
                                <Typography variant="body2" color="textSecondary">
                                    {`${viewerImage.width} × ${viewerImage.height}`}
                                </Typography>

                                <Box sx={{ marginTop: 2, display: 'flex', flexWrap: 'wrap', gap: 0.75 }}>
                                    {FILTER_KEYS.flatMap(key =>
                                        (viewerImage[key] || []).map(value => (
                                            <Chip key={`viewer.${viewerImage._id}.${key}.${value}`} label={`${key}: ${value}`} />
                                        ))
                                    )}
                                </Box>

                                {loadingViewerPage && (
                                    <Box sx={{ display: 'flex', alignItems: 'center', gap: 1, marginTop: 2 }}>
                                        <CircularProgress size={18} />
                                        <Typography variant="body2" color="textSecondary">
                                            Loading more results…
                                        </Typography>
                                    </Box>
                                )}
                            </Box>
                        </Box>
                    )}
                </Dialog>
            </div>
        );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
