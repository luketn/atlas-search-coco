services:
  mongodb-atlas:
    image: mongodb/mongodb-atlas-local:8.2.6
    hostname: mongodbatlas
    ports:
      - "65001:27017"

  java-app:
    image: maven:3.9-amazoncorretto-25-al2023
    ports:
     - "8222:8222"
    depends_on:
      mongodb-atlas:
        condition: service_healthy
    volumes:
      - code:/opt/app
    working_dir: /opt/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
        CONNECTION_STRING: "mongodb://mongodbatlas/?directConnection=true"
        LM_STUDIO_BASE_URL: "${LM_STUDIO_BASE_URL:-http://host.docker.internal:1234}"
        JAVA_APP_ARGS: "${JAVA_APP_ARGS:---loadData}"
    command: sh -lc 'mvn package exec:java -Dexec.args="$$JAVA_APP_ARGS" -DskipTests'

volumes:
  code:
    driver: local
    driver_opts:
      type: none
      device: .
      o: bind

networks:
  local-atlas-network:
    ipam:
      config:
        - subnet: 10.89.0.0/24
